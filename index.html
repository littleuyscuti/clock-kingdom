function checkSetAnswer() {
  const q = questions[qIndex];
  const targetHAngle = (q.hour % 12) * 30 + q.min * 0.5;
  const targetMAngle = q.min * 6;
  const curHAngle = (setHour % 12) * 30 + setMin * 0.5;
  const curMAngle = setMin * 6;

  function angleDiff(a, b) {
    let d = ((a - b) % 360 + 360) % 360;
    if (d > 180) d = 360 - d;
    return d;
  }
  const hTol = 18, mTol = 15;
  const hOk = angleDiff(curHAngle, targetHAngle) <= hTol;
  const mOk = currentLevel === 4 ? true : angleDiff(curMAngle, targetMAngle) <= mTol;

  if (hOk && mOk) {
    beepCorrect();
    glowClock(true);
    showCorrectPopup();
    tickySay(randomHappy(), 'happy', 2000);
    document.getElementById('feedback-msg').textContent = '';
    document.getElementById('hint-msg').textContent = '';
    if (currentLevel === 17 && l15FirstTry) {
      l15QAnswered++;
      const marks = 10 + 5 * Math.floor((l15QAnswered - 1) / 4);
      l15Score += marks;
      const scoreEl = document.getElementById('ultimate-score-display');
      if (scoreEl) scoreEl.innerHTML = '<span class="ultimate-score-icon">'+SCORE_ICON_SVG+'</span> ' + l15Score;
      // +5s time bonus (first try correct, Ultimate Test only)
      ultimateDeadline += 5000;
      showL15TimeDelta(true);
    }
    correctPopupTimeoutId = setTimeout(() => { hideCorrectPopup(); qIndex++; showQuestion(qIndex); }, 1100);
  } else {
    wrongCount++; wrongCountThisQ++;
    updateGameStars(); // update live star indicator
    l15FirstTry = false;
    beepWrong();
    shakeClock();
    // -10s time penalty (first wrong attempt only, Ultimate Test only; clamped so timer can't go negative)
    if (currentLevel === 17 && !l15PenaltyApplied) {
      l15PenaltyApplied = true;
      ultimateDeadline -= 10000;
      if (ultimateDeadline < Date.now()) ultimateDeadline = Date.now();
      showL15TimeDelta(false);
    }
    document.getElementById('feedback-msg').textContent = t('wrongMsg');
    document.getElementById('hint-msg').textContent = '';
    // Same escalation as read-mode: 1st = oops, 2nd = general concept hint,
    // 3rd = specific direction + target via Ticky.
    // Hint bubbles are sticky (duration 0) — see checkReadAnswer for rationale.
    if (wrongCountThisQ === 1) {
      tickySay(randomOops(), 'sad', 0);
    } else if (wrongCountThisQ === 2) {
      const hint = getLevelHint(currentLevel, q);
      tickySay(hint || randomOops(), 'thinking', 0);
    } else {
      const zh = state.lang === 'zh';
      const cw = d => (d <= 180 ? t('hintCW') : t('hintCCW'));
      const parts = [];
      if (!hOk) {
        const diff = ((targetHAngle - curHAngle) % 360 + 360) % 360;
        parts.push(`${t('hintHour')} ${cw(diff)} ${zh ? '到' : 'to'} ${q.hour}`);
      }
      if (!mOk) {
        const diff = ((targetMAngle - curMAngle) % 360 + 360) % 360;
        // Target verbalised as a number on the dial. On the 5-tick → "3" (i.e.
        // 15 min). Off the 5-tick (L13 1-min set) → "8 過 3 格" / "past 8 by
        // 3 ticks" so the kid knows where on the dial to stop.
        let minTarget;
        if (q.min === 0) minTarget = '12';
        else if (q.min % 5 === 0) minTarget = String(q.min / 5);
        else {
          const big = Math.floor(q.min / 5);
          const rem = q.min - big * 5;
          minTarget = zh
            ? `${big} 再過 ${rem} 格`
            : `${big} (+${rem} ticks)`;
        }
        parts.push(`${t('hintMin')} ${cw(diff)} ${zh ? '到' : 'to'} ${minTarget}`);
      }
      const big = parts.join(zh ? '；' : '; ');
      tickySay(big || (getLevelHint(currentLevel, q) || randomOops()), 'thinking', 0);
    }
  }
}

// ═══════════════════════════════════════════════════════
// DRAG MECHANICS (unchanged)
// ═══════════════════════════════════════════════════════
function setupDragHandlers() {
  const svg = document.getElementById('clock-svg');
  if (!svg) return;
  svg.removeEventListener('pointerdown', onPointerDown);
  svg.addEventListener('pointerdown', onPointerDown, { passive: false });
  svg.style.cursor = 'grab';
  svg.style.touchAction = 'none';
}

function getAngleFromCenter(svg, clientX, clientY) {
  const rect = svg.getBoundingClientRect();
  // viewBox is "-20 -20 360 360" (see buildClockSVG). Map pixel → SVG unit:
  // svgX = viewBoxMinX + (clientX - rect.left) / rect.width * viewBoxWidth.
  const scaleX = 360 / rect.width, scaleY = 360 / rect.height;
  const svgX = -20 + (clientX - rect.left) * scaleX;
  const svgY = -20 + (clientY - rect.top) * scaleY;
  let angle = Math.atan2(svgY - CY, svgX - CX) * 180 / Math.PI + 90;
  if (angle < 0) angle += 360;
  return angle;
}

function distToHand(handEl, svg, clientX, clientY) {
  const rect = svg.getBoundingClientRect();
  // viewBox "-20 -20 360 360" — see getAngleFromCenter for the mapping.
  const scaleX = 360 / rect.width, scaleY = 360 / rect.height;
  const px = -20 + (clientX - rect.left) * scaleX;
  const py = -20 + (clientY - rect.top) * scaleY;
  const angleDeg = readHandAngle(handEl);
  const angleRad = (angleDeg - 90) * Math.PI / 180;
  const len = handEl.id === 'hand-hour' ? 90 : 130;
  const hx = CX + Math.cos(angleRad)*len, hy = CY + Math.sin(angleRad)*len;
  const dx = hx - CX, dy = hy - CY;
  const t2 = Math.max(0, Math.min(1, ((px-CX)*dx + (py-CY)*dy) / (dx*dx+dy*dy)));
  const lx = CX + t2*dx, ly = CY + t2*dy;
  return Math.sqrt((px-lx)**2 + (py-ly)**2);
}

function onPointerDown(e) {
  e.preventDefault();
  const svg = document.getElementById('clock-svg');
  if (!svg) return;
  const hEl = document.getElementById('hand-hour');
  const mEl = document.getElementById('hand-min');
  if (!hEl) return;
  const dh = distToHand(hEl, svg, e.clientX, e.clientY);
  const minHidden = HIDE_MINUTE.has(currentLevel);
  const dm = (minHidden || !mEl) ? Infinity : distToHand(mEl, svg, e.clientX, e.clientY);
  if (dh > 44 && dm > 44) return;
  dragState = { hand: dh <= dm ? 'hour' : 'min' };
  svg.style.cursor = 'grabbing';
  svg.setPointerCapture(e.pointerId);
  svg.addEventListener('pointermove', onPointerMove, { passive: false });
  svg.addEventListener('pointerup', onPointerUp);
  svg.addEventListener('pointercancel', onPointerUp);
}

function onPointerMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const svg = document.getElementById('clock-svg');
  const angle = getAngleFromCenter(svg, e.clientX, e.clientY);
  if (dragState.hand === 'min') {
    const newMin = ((Math.round(angle / 6) % 60) + 60) % 60;
    const prevMin = setMin;
    // Detect wrap-around crossing 12
    if (prevMin > 45 && newMin < 15) {
      setHour = setHour + 1;
      if (setHour > 12) setHour = 1;
    } else if (prevMin < 15 && newMin > 45) {
      setHour = setHour - 1;
      if (setHour < 1) setHour = 12;
    }
    setMin = newMin;
    document.getElementById('hand-min').setAttribute('transform', `rotate(${setMin*6} ${CX} ${CY})`);
    const hAngle = (setHour % 12) * 30 + setMin * 0.5;
    document.getElementById('hand-hour').setAttribute('transform', `rotate(${hAngle} ${CX} ${CY})`);
  } else {
    const fracHour = angle / 30;
    setHour = Math.round(fracHour) % 12;
    if (setHour <= 0) setHour = 12;
    document.getElementById('hand-hour').setAttribute('transform', `rotate(${(setHour%12)*30 + setMin*0.5} ${CX} ${CY})`);
  }
}

function onPointerUp(e) {
  dragState = null;
  const svg = document.getElementById('clock-svg');
  if (svg) {
    svg.style.cursor = 'grab';
    svg.removeEventListener('pointermove', onPointerMove);
    svg.removeEventListener('pointerup', onPointerUp);
    svg.removeEventListener('pointercancel', onPointerUp);
  }
}

// FEEDBACK HELPERS
// ═══════════════════════════════════════════════════════
function getClockWrap() {
  const tourWrap = document.getElementById('tour-clock-wrap');
  if (tourWrap && !document.getElementById('screen-tour').classList.contains('hidden')) return tourWrap;
  return document.getElementById('clock-wrap');
}
function glowClock() {
  const cw = getClockWrap();
  if (!cw) return;
  cw.classList.remove('wrong');
  cw.classList.add('correct');
  setTimeout(() => cw.classList.remove('correct'), 1100);
}
function shakeClock() {
  const cw = getClockWrap();
  if (!cw) return;
  cw.classList.remove('wrong');
  void cw.offsetWidth;
  cw.classList.add('wrong');
  setTimeout(() => cw.classList.remove('wrong'), 500);
}

function showCorrectPopup() {
  const overlay = document.getElementById('overlay-correct');
  const popup = document.getElementById('correct-popup-text');
  popup.textContent = randomHappy();
  overlay.classList.remove('hidden');
  // Spawn confetti from whichever clock is actually on screen.
  const tourWrap = document.getElementById('tour-clock-wrap');
  const gameWrap = document.getElementById('clock-wrap');
  const tourVisible = tourWrap && !document.getElementById('screen-tour').classList.contains('hidden');
  if (tourVisible) {
    spawnConfettiFromElement(tourWrap, 18);
  } else if (gameWrap && gameWrap.style.display !== 'none') {
    spawnConfettiFromElement(gameWrap, 18);
  } else {
    const dt = document.getElementById('digital-target');
    spawnConfettiFromElement(dt || document.body, 18);
  }
}
function hideCorrectPopup() {
  document.getElementById('overlay-correct').classList.add('hidden');
  correctPopupTimeoutId = null;
}

// Show a brief floating "+5s" / "-10s" label near the timer pill (L15 only)
function showL15TimeDelta(isPlus) {
  const timerEl = document.getElementById('ultimate-timer-display');
  if (!timerEl) return;
  const parent = timerEl.parentElement;
  if (!parent) return;
  // Remove any existing delta label so they don't pile up
  const old = parent.querySelector('.l15-time-delta');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = 'l15-time-delta ' + (isPlus ? 'plus' : 'minus');
  el.textContent = isPlus ? '+5s' : '-10s';
  parent.appendChild(el);
  // Clean up after animation finishes
  el.addEventListener('animationend', () => el.remove(), { once: true });
  // Force immediate timer display update instead of waiting for the next 200ms tick
  updateUltimateTimerDisplay();
}

function spawnConfettiFromElement(el, count) {
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const emojis = ['🎉','⭐','🌟','✨','🎊','🎈','🌈','💫','🎀'];
  const colors = ['#FF6B9D','#4ECDC4','#FFD93D','#6BE86B','#A78BFA','#FF9F40'];

  for (let i = 0; i < count; i++) {
    // Emoji pieces
    if (i < Math.ceil(count * 0.6)) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.textContent = emojis[i % emojis.length];
      const angle = (i / count) * 360 + Math.random() * 25;
      const dist = 90 + Math.random() * 100;
      const tx = Math.cos(angle * Math.PI/180) * dist;
      const ty = Math.sin(angle * Math.PI/180) * dist - 50;
      const dur = 0.8 + Math.random() * 0.5;
      const rot = (Math.random() - 0.5) * 720;
      piece.style.cssText = `left:${cx}px;top:${cy}px;--tx:${tx}px;--ty:${ty}px;--dur:${dur}s;--rot:${rot}deg;font-size:${20+Math.random()*14}px;`;
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), dur * 1000 + 100);
    } else {
      // Shape pieces
      const shape = document.createElement('div');
      shape.className = 'confetti-shape';
      const angle = Math.random() * 360;
      const dist = 60 + Math.random() * 120;
      const tx = Math.cos(angle * Math.PI/180) * dist;
      const ty = Math.sin(angle * Math.PI/180) * dist - 60;
      const dur = 0.9 + Math.random() * 0.6;
      const rot = Math.random() * 540;
      const size = 8 + Math.random() * 10;
      shape.style.cssText = `left:${cx}px;top:${cy}px;--tx:${tx}px;--ty:${ty}px;--dur:${dur}s;--rot:${rot}deg;width:${size}px;height:${size}px;background:${colors[i % colors.length]};border-radius:${Math.random()>0.5?'50%':'3px'};`;
      document.body.appendChild(shape);
      setTimeout(() => shape.remove(), dur * 1000 + 100);
    }
  }
}

// Confetti rain from top (level complete)
function spawnConfettiRain(duration = 2000) {
  const endTime = Date.now() + duration;
  function batch() {
    if (Date.now() > endTime) return;
    const count = 5;
    const emojis = ['🎉','⭐','🌟','✨','🎊','🎈','💫'];
    const colors = ['#FF6B9D','#4ECDC4','#FFD93D','#6BE86B','#A78BFA'];
    for (let i = 0; i < count; i++) {
      const isEmoji = Math.random() > 0.4;
      const piece = document.createElement('div');
      const x = Math.random() * window.innerWidth;
      const tx = (Math.random() - 0.5) * 100;
      const ty = window.innerHeight + 60;
      const dur = 1.5 + Math.random();
      const rot = Math.random() * 720;
      if (isEmoji) {
        piece.className = 'confetti-piece';
        piece.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        piece.style.cssText = `left:${x}px;top:-30px;--tx:${tx}px;--ty:${ty}px;--dur:${dur}s;--rot:${rot}deg;font-size:22px;`;
      } else {
        piece.className = 'confetti-shape';
        const size = 8 + Math.random() * 8;
        piece.style.cssText = `left:${x}px;top:-20px;--tx:${tx}px;--ty:${ty}px;--dur:${dur}s;--rot:${rot}deg;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};`;
      }
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), dur * 1000 + 200);
    }
    setTimeout(batch, 120);
  }
  batch();
}

// ═══════════════════════════════════════════════════════
// LEVEL COMPLETE
// ═══════════════════════════════════════════════════════
function endLevel() {
  const n = currentLevel;
  // L17 Ultimate Test is score-attack: it ends via timer (handleUltimateTimeout), never via question exhaustion.
  if (n === 17) return;
  storage.gameplayStop();
  stopUltimateTimer();
  const stars = wrongCount === 0 ? 3 : wrongCount === 1 ? 2 : wrongCount >= 4 ? 0 : 1;
  const prev = starsFor(n);
  if (stars > prev) { state.progress[n] = stars; saveState(); }
  // Gate decision uses best-of-attempts: a 3-star replay with 0 stars today still passes.
  showCompleteOverlay(stars, n, Math.max(prev, stars));
}

function showCompleteOverlay(stars, n, bestStars) {
  storage.happytime();
  const overlay = document.getElementById('overlay-complete');
  overlay.classList.remove('hidden');
  // Pass-gate uses best across attempts (passed in from endLevel); falls back to this attempt for direct callers.
  const effectiveStars = (typeof bestStars === 'number') ? bestStars : stars;
  const failed = effectiveStars === 0;
  // Headline: don't say "Done" on failure — that's misleading. Use a clear "didn't pass" instead, in red.
  const doneLabelEl = document.getElementById('complete-done-label');
  doneLabelEl.textContent = failed ? t('failHeader') : '🎉 ' + t('levelDone');
  doneLabelEl.style.color = failed ? '#FF6B9D' : '';
  // Subtitle: on failure, explain WHY — they need ≥1 star to unlock the next level.
  document.getElementById('complete-title').textContent = failed ? t('failWhy') : stars === 3 ? t('stars3') : stars === 2 ? t('stars2') : t('stars1');
  const nextBtn = document.getElementById('next-btn');
  if (failed) {
    nextBtn.textContent = t('tryAgainBtn');
    nextBtn.onclick = () => {
      document.getElementById('overlay-complete').classList.add('hidden');
      beginLevel(currentLevel);
    };
  } else {
    nextBtn.textContent = n < TOTAL_LEVELS ? t('nextLevel') : t('title');
    nextBtn.onclick = goNextLevel;
  }

  const starsEl = document.getElementById('complete-stars');
  let html = '';
  for (let i = 1; i <= 3; i++) html += `<span id="cstar-${i}" class="${i <= stars ? 'star-on' : 'star-off'}">★</span>`;
  starsEl.innerHTML = html;

  // Stars pop in sequence
  for (let i = 1; i <= 3; i++) {
    setTimeout(() => {
      const el = document.getElementById(`cstar-${i}`);
      if (el) {
        el.classList.add('pop');
        beepChime();
        setTimeout(() => el.classList.add('pop-settle'), 400);
      }
    }, i * 250);
  }

  if (failed) {
    setTimeout(() => {
      tickySayKey('failWhy', 'sad', 5000);
    }, 400);
  } else {
    // Confetti rain + fanfare
    setTimeout(() => {
      spawnConfettiRain(2200);
      beepFanfare();
      tickySayKey('tickyCheer', 'cheering', 5000);
    }, 400);
  }
}

function goNextLevel() {
  document.getElementById('overlay-complete').classList.add('hidden');
  if (currentLevel < TOTAL_LEVELS) {
    startLevel(currentLevel + 1);
  } else {
    showHome();
  }
}

// ═══════════════════════════════════════════════════════
// SPEED TEST MODE (falling-clock challenge, ported from clock-lava prototype)
// All state lives inside the SpeedTest IIFE so it cannot collide with the
// curriculum game globals (gameRunning, score, etc. are reused throughout).
// Speed Test is L11 — startLevel(11) routes here via showSpeedTest().
// ═══════════════════════════════════════════════════════
function showSpeedTest() {
  // Kept for compatibility — the live entry point is now startLevel(11) →
  // showTutorial(11), with the tutorial's start button handing off to
  // SpeedTest.start() directly. This function jumps straight to the
  // countdown so any stray caller skips the legacy modal.
  storage.gameplayStop();
  stopUltimateTimer();
  hideAllScreens();
  document.getElementById('screen-speedtest').classList.remove('hidden');
  document.body.classList.add('st-active');
  SpeedTest.localize();
  SpeedTest.start();
}

const SpeedTest = (function () {
  const MAX_LIVES = 3;
  const LAVA_ZONE_H = 90;
  const TIMING_WINDOWS = [
    { start: 0,   end: 30,  fallDuration: 12000, intervalStart: 10000, intervalEnd: 8000, maxOnScreen: 1, emptyCatchup: 3000, points: 10 },
    { start: 30,  end: 60,  fallDuration: 10000, intervalStart: 8000,  intervalEnd: 6500, maxOnScreen: 2, emptyCatchup: 2500, points: 15 },
    { start: 60,  end: 90,  fallDuration: 8000,  intervalStart: 7000,  intervalEnd: 5500, maxOnScreen: 2, emptyCatchup: 2000, points: 20 },
    { start: 90,  end: 120, fallDuration: 7000,  intervalStart: 6000,  intervalEnd: 5000, maxOnScreen: 3, emptyCatchup: 1500, points: 25 },
    { start: 120, end: 180, fallDuration: 5500,  intervalStart: 5000,  intervalEnd: 4000, maxOnScreen: 3, emptyCatchup: 1000, points: 30 },
  ];
  const MIN_SPAWN_GAP  = 3500;
  const ST_CX = 120, ST_CY = 120, ST_R = 108;

  let gameRunning    = false;
  let gameStartTime  = 0;
  let score          = 0;
  let livesLeft      = MAX_LIVES;
  let fallingClocks  = [];
  let clockIdCounter = 0;
  let correctChoiceIdx = -1;
  let currentChoices   = [];
  let currentTargetId  = null;
  let spawnTimer     = null;
  let animFrameId    = null;
  let lastSpawnTime  = 0;

  function $(id) { return document.getElementById(id); }
  function playArea() { return $('st-play-area'); }
  function scoreEl() { return $('st-score-display'); }
  function livesEl() { return $('st-lives-display'); }
  function startOverlay() { return $('st-overlay-start'); }
  function endOverlay() { return $('st-overlay-end'); }
  function endMsgEl() { return $('st-end-msg'); }
  function choiceButtons() { return Array.from(document.querySelectorAll('#st-choice-grid .st-choice-btn')); }
  function setScore(v) { score = v; scoreEl().innerHTML = '<span class="st-score-icon">'+SCORE_ICON_SVG+'</span> ' + v; }

  function randomTime() {
    const hour    = 1 + Math.floor(Math.random() * 12);
    const elapsed = (performance.now() - gameStartTime) / 1000;
    let minute;
    // Phases 1-2 (0-60s): easy 5-mark minutes only.
    // Phases 3-5 (60s+): any minute 0-59 — includes between-mark times like
    // L8's "between number minute" curriculum.
    if (elapsed < 60) {
      minute = Math.floor(Math.random() * 12) * 5;
    } else {
      minute = Math.floor(Math.random() * 60);
    }
    return { hour, minute };
  }
  function formatTime(h, m) {
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }
  function getCurrentTiming() {
    const elapsed = (performance.now() - gameStartTime) / 1000;
    let win = TIMING_WINDOWS[TIMING_WINDOWS.length - 1];
    let pastEnd = false;
    for (const w of TIMING_WINDOWS) {
      if (elapsed < w.end) { win = w; break; }
      if (w === TIMING_WINDOWS[TIMING_WINDOWS.length - 1]) pastEnd = true;
    }
    let tt;
    if (pastEnd) tt = 1;
    else {
      const span = win.end - win.start;
      tt = span > 0 ? Math.max(0, Math.min(1, (elapsed - win.start) / span)) : 0;
    }
    const spawnInterval = win.intervalStart + (win.intervalEnd - win.intervalStart) * tt;
    return { spawnInterval, fallDuration: win.fallDuration, maxOnScreen: win.maxOnScreen, emptyCatchup: win.emptyCatchup, points: win.points };
  }
  function playAreaSize() {
    const r = playArea().getBoundingClientRect();
    return { w: r.width, h: r.height };
  }
  function lavaHitOffset() { return LAVA_ZONE_H; }

  function renderLives() {
    for (let i = 1; i <= MAX_LIVES; i++) {
      const heart = $('st-heart-' + i);
      if (!heart) continue;
      if (i > livesLeft) heart.classList.add('st-lost');
      else               heart.classList.remove('st-lost');
    }
  }
  function loseLife() {
    if (livesLeft <= 0) return;
    livesLeft--;
    renderLives();
    const ld = livesEl();
    ld.classList.remove('st-lives-shake');
    void ld.offsetWidth;
    ld.classList.add('st-lives-shake');
    setTimeout(() => ld.classList.remove('st-lives-shake'), 400);
    if (livesLeft <= 0) endGame();
  }

  function buildClockSVG(hour, minute) {
    const minDeg  = (minute / 60) * 360;
    const hourDeg = ((hour % 12) / 12) * 360 + (minute / 60) * 30;
    let ticks = '';
    for (let i = 0; i < 60; i++) {
      const angleDeg = (i * 6) - 90;
      const rad = angleDeg * Math.PI / 180;
      const isHour = i % 5 === 0;
      const outer = ST_R - 3;
      const inner = isHour ? ST_R - 15 : ST_R - 7;
      const x1 = ST_CX + Math.cos(rad) * outer;
      const y1 = ST_CY + Math.sin(rad) * outer;
      const x2 = ST_CX + Math.cos(rad) * inner;
      const y2 = ST_CY + Math.sin(rad) * inner;
      ticks += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${isHour ? '#B0BEC5' : '#E0E0E0'}" stroke-width="${isHour ? 2.2 : 1.1}" stroke-linecap="round"/>`;
    }
    let nums = '';
    const numRadius = ST_R - 22;
    for (let n = 1; n <= 12; n++) {
      const angleDeg = (n * 30) - 90;
      const rad = angleDeg * Math.PI / 180;
      const nx = ST_CX + Math.cos(rad) * numRadius;
      const ny = ST_CY + Math.sin(rad) * numRadius;
      nums += `<text x="${nx.toFixed(1)}" y="${ny.toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#2D3047" font-family="'Fredoka','Noto Sans TC',sans-serif">${n}</text>`;
    }
    const hourHandLen = 64;
    const minHandLen  = 93;
    return `<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <circle cx="${ST_CX}" cy="${ST_CY}" r="${ST_R}" fill="white" stroke="#E0E8FF" stroke-width="3"/>
      <circle cx="${ST_CX}" cy="${ST_CY}" r="${ST_R - 6}" fill="#FAFCFF" stroke="none"/>
      ${ticks}${nums}
      <line x1="${ST_CX}" y1="${ST_CY}" x2="${ST_CX}" y2="${ST_CY - hourHandLen}" stroke="#E63946" stroke-width="8" stroke-linecap="round" transform="rotate(${hourDeg.toFixed(2)} ${ST_CX} ${ST_CY})"/>
      <line x1="${ST_CX}" y1="${ST_CY}" x2="${ST_CX}" y2="${ST_CY - minHandLen}" stroke="#457B9D" stroke-width="5" stroke-linecap="round" transform="rotate(${minDeg.toFixed(2)} ${ST_CX} ${ST_CY})"/>
      <circle cx="${ST_CX}" cy="${ST_CY}" r="9" fill="#FFD93D" stroke="white" stroke-width="2"/>
    </svg>`;
  }

  function spawnClock() {
    if (!gameRunning) return;
    const timing = getCurrentTiming();
    const { w } = playAreaSize();
    const active = fallingClocks.filter(c => !c.done);
    if (active.length >= timing.maxOnScreen) return;

    const { hour, minute } = randomTime();
    const id      = ++clockIdCounter;
    const timeStr = formatTime(hour, minute);
    const clockW = 215;
    const rangeX = Math.max(0, w - clockW);

    // Avoid spawning where the falling clock would overlap the score pill
    // (top-left of play area) during its first frames of fall.
    const sc = scoreEl();
    const pa = playArea();
    let forbid = null;
    if (sc && pa) {
      const sr = sc.getBoundingClientRect();
      const pr = pa.getBoundingClientRect();
      const PAD = 8;
      const lo = Math.max(0, (sr.left - pr.left) - clockW - PAD);
      const hi = Math.min(rangeX, (sr.right - pr.left) + PAD);
      if (hi > lo) forbid = { lo, hi };
    }
    const isForbidden = (x) => !!forbid && x >= forbid.lo && x <= forbid.hi;
    const sampleX = () => {
      const x = Math.random() * rangeX;
      if (!isForbidden(x)) return x;
      const below = forbid.lo;
      const above = Math.max(0, rangeX - forbid.hi);
      if (below + above <= 0) return x;
      const r = Math.random() * (below + above);
      return r < below ? r : forbid.hi + (r - below);
    };

    const activeCenters = active.map(c => parseFloat(c.el.style.left) + clockW / 2);
    const MIN_CENTER_GAP = 200;
    let bestX = sampleX();
    if (activeCenters.length > 0) {
      let bestDist = -Infinity;
      for (let attempt = 0; attempt < 6; attempt++) {
        const candidateX = sampleX();
        const candidateCenter = candidateX + clockW / 2;
        const minDist = Math.min(...activeCenters.map(c => Math.abs(candidateCenter - c)));
        if (minDist > bestDist) { bestDist = minDist; bestX = candidateX; }
      }
      if (bestDist < MIN_CENTER_GAP) {
        const far = rangeX - (activeCenters[0] - clockW / 2);
        let candidate = Math.max(0, Math.min(far, rangeX));
        if (isForbidden(candidate)) {
          const mid = (forbid.lo + forbid.hi) / 2;
          candidate = candidate < mid ? Math.max(0, forbid.lo - 1) : Math.min(rangeX, forbid.hi + 1);
        }
        bestX = candidate;
      }
    }
    const x = bestX;

    const el = document.createElement('div');
    el.className = 'st-falling-clock';
    el.id = `st-clock-${id}`;
    el.style.left = `${x}px`;
    el.style.top  = '0px';
    el.style.transform = 'translate3d(0, 10px, 0)';

    const svgWrap = document.createElement('div');
    svgWrap.className = 'st-clock-svg-wrap';
    svgWrap.innerHTML = buildClockSVG(hour, minute);
    el.appendChild(svgWrap);
    playArea().appendChild(el);

    const clock = {
      id, hour, minute, timeStr, el,
      // virtualElapsed advances by dt × speedMultiplier each frame, so we can
      // accelerate a clock mid-fall without snapping it to a new position.
      // Wrong tap on a target clock multiplies its speed by 1.5×, compounding.
      virtualElapsed: 0,
      lastTickTime:   performance.now(),
      speedMultiplier: 1,
      fallDuration:   timing.fallDuration,
      points:         timing.points,
      done: false, popping: false, currentY: 10,
    };
    fallingClocks.push(clock);
    lastSpawnTime = performance.now();
    syncChoicesToTarget();
  }

  function updateClockPositions(now) {
    const { h: areaH } = playAreaSize();
    const lavaTop = areaH - lavaHitOffset();
    const hitY = lavaTop - 150;
    for (const clock of fallingClocks) {
      if (clock.done || clock.popping) continue;
      const dt = now - clock.lastTickTime;
      clock.lastTickTime = now;
      clock.virtualElapsed += dt * clock.speedMultiplier;
      const progress = Math.min(clock.virtualElapsed / clock.fallDuration, 1);
      const SPAWN_TOP = 10;
      const y = SPAWN_TOP + progress * (hitY - SPAWN_TOP);
      clock.currentY = y;
      clock.el.style.transform = `translate3d(0, ${y}px, 0)`;
      if (progress >= 1) {
        clock.done = true;
        spawnLavaSplash(clock);
        clock.el.remove();
        loseLife();
      }
    }
    fallingClocks = fallingClocks.filter(c => !c.done);
    syncChoicesToTarget();
  }

  function spawnLavaSplash(clock) {
    const { h } = playAreaSize();
    const lavaTop = h - lavaHitOffset();
    const x = parseFloat(clock.el.style.left) + 107;
    const splash = document.createElement('div');
    splash.className = 'st-lava-splash';
    splash.style.left = `${x}px`;
    splash.style.top  = `${lavaTop}px`;
    playArea().appendChild(splash);
    setTimeout(() => splash.remove(), 600);
  }

  function popClock(clock) {
    clock.popping = true;
    clock.done    = true;
    const wrap = clock.el.querySelector('.st-clock-svg-wrap');
    if (wrap) wrap.classList.add('st-is-popping');
    clock.el.classList.remove('st-is-target');
    const x = parseFloat(clock.el.style.left) + 107;
    const y = clock.currentY != null ? clock.currentY : 100;
    const pts = clock.points;
    const pop = document.createElement('div');
    pop.className = 'st-score-pop';
    pop.textContent = `+${pts}`;
    pop.style.left = `${x}px`;
    pop.style.top  = `${y}px`;
    // Horizontal centering is handled by the .st-score-pop animation keyframes
    // (translate(-50%, 0)), matching L14's popup visual treatment.
    playArea().appendChild(pop);
    setTimeout(() => pop.remove(), 850);
    setTimeout(() => { clock.el.remove(); }, 350);
    setScore(score + pts);
  }

  function getTargetClock() {
    let best = null;
    for (const c of fallingClocks) {
      if (c.done || c.popping) continue;
      const y = c.currentY != null ? c.currentY : 0;
      if (best == null || y > (best.currentY != null ? best.currentY : 0)) best = c;
    }
    return best;
  }
  function generateChoices(target) {
    const correct = { hour: target.hour, minute: target.minute };
    const otherMinutes = [];
    for (let m = 0; m < 60; m += 5) if (m !== correct.minute) otherMinutes.push(m);
    const sameHour = { hour: correct.hour, minute: otherMinutes[Math.floor(Math.random() * otherMinutes.length)] };
    const otherHours = [];
    for (let h = 1; h <= 12; h++) if (h !== correct.hour) otherHours.push(h);
    const sameMinute = { hour: otherHours[Math.floor(Math.random() * otherHours.length)], minute: correct.minute };
    const isDup = (a, b) => a.hour === b.hour && a.minute === b.minute;
    let randomChoice;
    for (let attempt = 0; attempt < 50; attempt++) {
      const cand = randomTime();
      if (!isDup(cand, correct) && !isDup(cand, sameHour) && !isDup(cand, sameMinute)) { randomChoice = cand; break; }
    }
    if (!randomChoice) randomChoice = { hour: ((correct.hour) % 12) + 1, minute: (correct.minute + 5) % 60 };
    const choices = [correct, sameHour, sameMinute, randomChoice];
    for (let i = choices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [choices[i], choices[j]] = [choices[j], choices[i]];
    }
    const correctIdx = choices.findIndex(c => c === correct);
    return { choices, correctIdx };
  }
  function clearTargetGlow() {
    for (const c of fallingClocks) if (c.el) c.el.classList.remove('st-is-target');
  }
  function renderChoices() {
    const target = getTargetClock();
    clearTargetGlow();
    const btns = choiceButtons();
    if (!target) {
      currentChoices = []; correctChoiceIdx = -1; currentTargetId = null;
      for (const btn of btns) { btn.textContent = '--:--'; btn.classList.remove('st-correct-flash', 'st-wrong-shake'); }
      return;
    }
    target.el.classList.add('st-is-target');
    const { choices, correctIdx } = generateChoices(target);
    currentChoices = choices; correctChoiceIdx = correctIdx; currentTargetId = target.id;
    for (let i = 0; i < btns.length; i++) {
      btns[i].textContent = formatTime(choices[i].hour, choices[i].minute);
      btns[i].classList.remove('st-correct-flash', 'st-wrong-shake');
    }
  }
  function syncChoicesToTarget() {
    const target = getTargetClock();
    const newId = target ? target.id : null;
    if (newId !== currentTargetId) renderChoices();
  }
  function handleChoiceClick(idx, btn) {
    if (!gameRunning) return;
    if (correctChoiceIdx < 0) return;
    const target = fallingClocks.find(c => c.id === currentTargetId && !c.done && !c.popping);
    if (!target) { renderChoices(); return; }
    if (idx === correctChoiceIdx) {
      popClock(target);
      btn.classList.add('st-correct-flash');
      setTimeout(() => btn.classList.remove('st-correct-flash'), 320);
      renderChoices();
    } else {
      // Punish wrong taps by accelerating the targeted clock by 1.5× —
      // compounds per wrong tap on the same clock.
      target.speedMultiplier *= 1.5;
      btn.classList.remove('st-wrong-shake');
      void btn.offsetWidth;
      btn.classList.add('st-wrong-shake');
      setTimeout(() => btn.classList.remove('st-wrong-shake'), 360);
    }
  }

  function gameLoop(now) {
    if (!gameRunning) return;
    updateClockPositions(now);
    const liveCount = fallingClocks.filter(c => !c.done && !c.popping).length;
    if (liveCount === 0 && (now - lastSpawnTime) >= getCurrentTiming().emptyCatchup) {
      spawnClock();
      if (spawnTimer) { clearTimeout(spawnTimer); spawnTimer = null; }
      scheduleSpawn();
    }
    animFrameId = requestAnimationFrame(gameLoop);
  }
  function scheduleSpawn() {
    if (!gameRunning) return;
    const timing = getCurrentTiming();
    const sinceLastSpawn = performance.now() - lastSpawnTime;
    if (sinceLastSpawn >= MIN_SPAWN_GAP) spawnClock();
    const jitter = timing.spawnInterval * 0.2;
    let nextIn = timing.spawnInterval + (Math.random() * jitter * 2 - jitter);
    const sinceNow = performance.now() - lastSpawnTime;
    nextIn = Math.max(nextIn, MIN_SPAWN_GAP - sinceNow);
    nextIn = Math.max(500, nextIn);
    spawnTimer = setTimeout(scheduleSpawn, nextIn);
  }

  // Public start: hide the start overlay, run the 3-2-1 countdown, then call
  // actuallyStartGame() once "1" finishes. Called for both first-play (Start)
  // and Play Again (restart) buttons.
  function startGame() {
    // Cancel any prior in-flight game state before the countdown so a quick
    // restart can't leave timers/clocks running underneath the countdown.
    stop();
    livesLeft = MAX_LIVES;
    setScore(0);
    renderLives();
    startOverlay().classList.add('hidden');
    endOverlay().classList.add('hidden');
    runCountdown();
  }

  function runCountdown() {
    const overlay = $('st-countdown');
    if (!overlay) { actuallyStartGame(); return; }
    const numEl = overlay.querySelector('.st-countdown-num');
    overlay.classList.remove('hidden');

    let n = 3;
    function showNum() {
      numEl.textContent = n;
      // Restart the CSS animation so each digit replays the pop in/out.
      numEl.style.animation = 'none';
      void numEl.offsetWidth; // force reflow
      numEl.style.animation = '';
      n--;
      if (n >= 1) {
        setTimeout(showNum, 1000);
      } else {
        setTimeout(() => {
          overlay.classList.add('hidden');
          actuallyStartGame();
        }, 1000);
      }
    }
    showNum();
  }

  function actuallyStartGame() {
    setScore(0);
    livesLeft = MAX_LIVES;
    gameRunning = true;
    gameStartTime = performance.now();
    // Backdate lastSpawnTime so scheduleSpawn() spawns the first clock
    // immediately on its very first call (sinceLastSpawn >= MIN_SPAWN_GAP).
    // This still respects the empty-screen catchup logic and MIN_SPAWN_GAP
    // for subsequent spawns because lastSpawnTime is updated inside
    // spawnClock() itself.
    lastSpawnTime = performance.now() - MIN_SPAWN_GAP;
    fallingClocks.forEach(c => { try { c.el.remove(); } catch(e) {} });
    fallingClocks    = [];
    clockIdCounter   = 0;
    currentTargetId  = null;
    correctChoiceIdx = -1;
    currentChoices   = [];
    const pa = playArea();
    if (pa) pa.querySelectorAll('.st-score-pop, .st-lava-splash').forEach(e => e.remove());
    renderLives();
    renderChoices();
    startOverlay().classList.add('hidden');
    endOverlay().classList.add('hidden');
    animFrameId = requestAnimationFrame(gameLoop);
    scheduleSpawn();
  }

  function endGame() {
    gameRunning = false;
    if (spawnTimer) { clearTimeout(spawnTimer); spawnTimer = null; }
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    setTimeout(() => {
      fallingClocks.forEach(c => { if (!c.done) { try { c.el.remove(); } catch(e) {} } });
      fallingClocks = [];
    }, 100);
    // Mirror L14 finished overlay: title (already set via localize), then either
    // "New best!" + big score, or just big score. Best stored in localStorage.
    const bestKey = 'clockKingdom_speedtest_best';
    let bestScore = 0;
    try { bestScore = parseInt(localStorage.getItem(bestKey) || '0', 10); } catch(e) {}
    let newBest = false;
    if (score > bestScore) {
      bestScore = score;
      try { localStorage.setItem(bestKey, String(bestScore)); } catch(e) {}
      newBest = true;
    }
    // Top message: "New best!" callout if scoring up, "Didn't pass + why" if still at 0,
    // otherwise empty so the score block is the dominant element.
    const msgEl = endMsgEl();
    if (newBest && score > 0) {
      msgEl.innerHTML = `<div style="color:#FF6B9D;font-size:22px;font-weight:700;">${t('stNewBest')}</div>`;
    } else if (bestScore === 0) {
      msgEl.innerHTML = `<div style="color:#FF6B9D;font-size:22px;font-weight:700;">${t('failHeader')}</div><div style="color:#2D3047;font-size:15px;font-weight:600;margin-top:4px;">${t('stFailWhy')}</div>`;
    } else {
      msgEl.innerHTML = '';
    }
    // Trophy score block (matches regular-level overlay tone — yellow .complete-card,
    // big trophy + score, smaller best-row underneath).
    const iconEl = $('st-end-score-icon');
    if (iconEl) iconEl.innerHTML = SCORE_ICON_SVG;
    const bestIconEl = $('st-end-best-icon');
    if (bestIconEl) bestIconEl.innerHTML = SCORE_ICON_SVG;
    const valEl = $('st-end-score-value');
    if (valEl) valEl.textContent = String(score);
    const bestValEl = $('st-end-best-value');
    if (bestValEl) bestValEl.textContent = String(bestScore);
    // Score=0 with no prior best fails the gate: hide "Next Level →" so the only path forward is Try Again.
    // Matches isUnlocked(12) which already requires best > 0.
    const nextBtn = $('st-btn-next');
    if (nextBtn) nextBtn.style.display = bestScore > 0 ? '' : 'none';
    endOverlay().classList.remove('hidden');
  }

  // Hard stop — invoked by hideAllScreens / language toggle / back. Cleans up
  // the loop, the spawn timer, and any DOM artefacts. Safe to call when
  // already stopped.
  function stop() {
    gameRunning = false;
    if (spawnTimer) { clearTimeout(spawnTimer); spawnTimer = null; }
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    fallingClocks.forEach(c => { try { c.el.remove(); } catch(e) {} });
    fallingClocks = [];
    const pa = playArea();
    // Belt-and-suspenders: also nuke any orphan .st-falling-clock elements
    // that may exist in the DOM but aren't tracked in fallingClocks.
    if (pa) pa.querySelectorAll('.st-falling-clock, .st-score-pop, .st-lava-splash').forEach(e => e.remove());
  }

  function showStartOverlay() {
    stop();
    livesLeft = MAX_LIVES;
    setScore(0);
    renderLives();
    endOverlay().classList.add('hidden');
    startOverlay().classList.remove('hidden');
  }

  function backHome() {
    stop();
    if (typeof showHome === 'function') showHome();
  }

  function localize() {
    // Pull strings from the main app's i18n table (S/state.lang via t()).
    const setText = (id, v) => { const e = $(id); if (e) e.textContent = v; };
    setText('st-level-label', t('stTitle'));
    setText('st-start-title', t('stStartTitle'));
    setText('st-start-subtitle', t('stStartSubtitle'));
    setText('st-btn-start', t('stStartBtn'));
    setText('st-btn-restart', t('stPlayAgain'));
    setText('st-btn-next', t('nextLevel'));
    setText('st-end-best-label', t('stBestLabel'));
  }

  // Wire up button handlers once on module init.
  document.addEventListener('DOMContentLoaded', wireButtons);
  if (document.readyState !== 'loading') wireButtons();
  function wireButtons() {
    const startBtn = $('st-btn-start');
    const restartBtn = $('st-btn-restart');
    const nextBtn = $('st-btn-next');
    const endCloseBtn = $('st-end-close');
    if (startBtn && !startBtn._stWired) { startBtn._stWired = true; startBtn.addEventListener('click', startGame); }
    if (restartBtn && !restartBtn._stWired) { restartBtn._stWired = true; restartBtn.addEventListener('click', startGame); }
    if (nextBtn && !nextBtn._stWired) {
      nextBtn._stWired = true;
      nextBtn.addEventListener('click', () => {
        if (typeof beepTap === 'function') beepTap();
        endOverlay().classList.add('hidden');
        stop();
        // Speed Test IS L11 — "Next Level" dispatches to L12 (Set Time · 5 min,
        // the next curriculum level after the Speed Test slot).
        if (typeof startLevel === 'function') startLevel(12);
      });
    }
    if (endCloseBtn && !endCloseBtn._stWired) {
      endCloseBtn._stWired = true;
      endCloseBtn.addEventListener('click', () => {
        if (typeof beepTap === 'function') beepTap();
        endOverlay().classList.add('hidden');
        backHome();
      });
    }
    choiceButtons().forEach(btn => {
      if (btn._stWired) return;
      btn._stWired = true;
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.getAttribute('data-idx'), 10);
        handleChoiceClick(idx, btn);
      });
    });
  }

  return { start: startGame, stop, showStartOverlay, backHome, localize };
})();

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
// One-time migration for the L9 Speed Test renumber: old curriculum levels
// 9..14 shift up to 10..15 (Speed Test takes the L9 slot). Only fires if the
// new key is missing — safe to leave in for legacy save files.
function migrateLevelNumbering_v9speedtest() {
  // localStorage best-score keys (Ultimate Test): l14_best → l15_best
  try {
    const oldBest = localStorage.getItem('clockKingdom_l14_best');
    const newBest = localStorage.getItem('clockKingdom_l15_best');
    if (oldBest && !newBest) {
      localStorage.setItem('clockKingdom_l15_best', oldBest);
      localStorage.removeItem('clockKingdom_l14_best');
    }
  } catch(e) {}
  // In-memory state.progress: shift indices 14→15, 13→14, … 9→10. DESC order
  // so the source slot is always read before the destination slot is written.
  try {
    if (state && state.progress && typeof state.progress === 'object') {
      let mutated = false;
      for (let n = 14; n >= 9; n--) {
        if (state.progress[n] !== undefined && state.progress[n + 1] === undefined) {
          state.progress[n + 1] = state.progress[n];
          delete state.progress[n];
          mutated = true;
        }
      }
      if (mutated) saveState();
    }
  } catch(e) {}
}

// One-time migration for the L9 Read-the-Clock restore: old curriculum levels
// 10..15 shift up to 11..16 (the new L9 read-both-hands level slots in below
// Speed Test). Speed Test stays at L10, takes its old slot. L9 starts blank.
// Only fires if the new key is missing — safe to leave in for legacy save files.
function migrateLevelNumbering_v9readclock() {
  // Best-score key stays the same (clockKingdom_l15_best is just an identifier;
  // the score IS the Ultimate Test best regardless of level number).
  // In-memory state.progress: shift indices 15→16, 14→15, … 10→11. DESC order.
  try {
    if (state && state.progress && typeof state.progress === 'object') {
      let mutated = false;
      for (let n = 15; n >= 10; n--) {
        if (state.progress[n] !== undefined && state.progress[n + 1] === undefined) {
          state.progress[n + 1] = state.progress[n];
          delete state.progress[n];
          mutated = true;
        }
      }
      if (mutated) saveState();
    }
  } catch(e) {}
}

// One-time migration for the L10 Read-1-min insertion: old curriculum levels
// 11..16 shift up to 12..17 to make room for the new L10 (Read both hands · 1 min).
// Speed Test moves from L10 to L11 (its slot index increases by 1). Idempotent
// via a stored flag on state.migrations so it only runs once even if the user's
// save already happens to look "shifted".
function migrateLevelNumbering_v10read1min() {
  try {
    if (!state || typeof state !== 'object') return;
    if (!state.migrations || typeof state.migrations !== 'object') state.migrations = {};
    if (state.migrations.v10read1min) return;
    if (state.progress && typeof state.progress === 'object') {
      // Shift 16→17, 15→16, … 11→12 (DESC). Skip 10 — Speed Test never recorded
      // stars there, and the new L10 (Read 1-min) starts blank.
      for (let n = 16; n >= 11; n--) {
        if (state.progress[n] !== undefined && state.progress[n + 1] === undefined) {
          state.progress[n + 1] = state.progress[n];
          delete state.progress[n];
        }
      }
      // Old L10 slot was Speed Test (no progress recorded), but if any stale
      // value lives there from earlier saves, drop it — the new L10 is a fresh
      // curriculum level and shouldn't inherit Speed Test artifacts.
      if (state.progress[10] !== undefined) delete state.progress[10];
    }
    state.migrations.v10read1min = true;
    saveState();
  } catch(e) {}
}

(async () => {
  // Render immediately from localStorage so the screen is never blank
  // while the CrazyGames SDK is still downloading/initialising.
  try {
    const s = localStorage.getItem('clockgame_v8');
    if (s) { const p = JSON.parse(s); if (p.version === 8) state = p; }
  } catch(e) {}
  migrateLevelNumbering_v9speedtest();
  migrateLevelNumbering_v9readclock();
  migrateLevelNumbering_v10read1min();
  showHome();

  // Upgrade to SDK storage in the background — cap at 2 s so a slow or
  // offline SDK never leaves the game stuck.
  const timeout = new Promise(r => setTimeout(r, 2000));
  await Promise.race([storage.init(), timeout]);
  if (storage.useSdk) {
    try {
      const s = await storage.getItem('clockgame_v8');
      if (s) {
        const p = JSON.parse(s);
        if (p.version === 8) {
          // MERGE — don't overwrite. While SDK init was in-flight, the user
          // may have already played and earned stars; those saves went to
          // localStorage only (useSdk was false at save time). Replacing
          // `state` with the SDK snapshot would wipe that in-flight progress
          // — exact symptom: pass L10 → press Next → back to home → L10
          // shows locked because state.progress[10] just got clobbered.
          // Take the max per level so we never lose stars from either side.
          const sdkProgress = (p.progress && typeof p.progress === 'object') ? p.progress : {};
          state.progress = state.progress || {};
          for (const k of Object.keys(sdkProgress)) {
            const sdkStars = sdkProgress[k] || 0;
            const memStars = state.progress[k] || 0;
            if (sdkStars > memStars) state.progress[k] = sdkStars;
          }
          // Union migration flags so a once-applied shift never re-runs.
          state.migrations = Object.assign({}, p.migrations || {}, state.migrations || {});
          // Lang preference: prefer SDK if memory hasn't set one yet.
          if (!state.lang && p.lang) state.lang = p.lang;
          state.version = 8;
          migrateLevelNumbering_v9speedtest();
          migrateLevelNumbering_v9readclock();
          migrateLevelNumbering_v10read1min();
          // Push the merged state back so SDK + localStorage converge.
          saveState();
          renderHome();
        }
      }
    } catch(e) {}
  }
})();
</script>
